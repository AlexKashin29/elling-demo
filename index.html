<title>Эллинг v1.58 «Настройки» — рабочий MVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Палитра «грунт и сталь» · акцент — сурик (красно-рыжий грунт корпуса на стапеле); циан-сталь — только для данных */
  :root{
    --bg:#F4F4F6; --panel:#FFFFFF; --panel2:#F4F5F7; --side:#0E1620; --side-ink:#93A7BC; --side-act:#37AECF;
    --ink:#111A24; --ink2:#48586A; --muted:#7C8C9C;
    --line:#E3E7EC; --line2:#ECEFF3; --sh:0 1px 2px rgba(16,24,40,.05),0 4px 14px -3px rgba(16,24,40,.09);--sh-lg:0 14px 34px -10px rgba(16,24,40,.18),0 5px 12px -6px rgba(16,24,40,.12);
    --accent:#0C6B8F; --accent-soft:#DCEBF1; --steel:#0E7C93;
    --navy:#1F3A50; --navy-soft:#E4EBF3;
    --good:#1E7D46; --good-soft:#E1F1E7; --warn:#A9660A; --warn-soft:#F8EEDA; --risk:#C0362E; --risk-soft:#F9E4E1;
    
    --glow:0 0 0 1px rgba(12,107,143,.18), 0 8px 30px -8px rgba(30,50,70,.18);
    --shadow:0 10px 34px -14px rgba(20,35,55,.28);
    --aura:none;
    --mono:"Cascadia Mono",Consolas,"Roboto Mono",ui-monospace,monospace;
    --sans:"Onest","Segoe UI",-apple-system,"Helvetica Neue",Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#080C12;--panel:#111A24;--panel2:#17222F;--side:#060A0F;--side-ink:#8195A9;
      --ink:#EAF1F8;--ink2:#A7B7C7;--muted:#6E8091;--line:#26343F;--line2:#1E2A36;--sh:0 1px 2px rgba(0,0,0,.4),0 6px 18px -4px rgba(0,0,0,.55);--sh-lg:0 18px 42px -10px rgba(0,0,0,.75),0 6px 14px -6px rgba(0,0,0,.5);
      --accent:#37AECF;--accent-soft:#0D2A36;--steel:#3AAFC9;--navy:#8FB4D1;--navy-soft:#16283A;
      --good:#5FD08B;--good-soft:#122A1B;--warn:#E0A03C;--warn-soft:#2E2410;--risk:#F0736A;--risk-soft:#331714;
      
      --glow:0 0 0 1px rgba(55,174,207,.20), 0 10px 40px -10px rgba(0,0,0,.6);
      --shadow:0 16px 50px -18px rgba(0,0,0,.7);
      --aura:radial-gradient(1150px 680px at 80% -10%, rgba(55,174,207,.09), transparent 58%), radial-gradient(950px 640px at 8% 112%, rgba(46,110,142,.06), transparent 55%);}
  }
  :root[data-theme="light"]{--bg:#F4F4F6;--panel:#FFFFFF;--panel2:#F4F5F7;--side:#0E1620;--side-ink:#93A7BC;
    --ink:#111A24;--ink2:#48586A;--muted:#7C8C9C;--line:#E3E7EC;--line2:#ECEFF3;--sh:0 1px 2px rgba(16,24,40,.05),0 4px 14px -3px rgba(16,24,40,.09);--sh-lg:0 14px 34px -10px rgba(16,24,40,.18),0 5px 12px -6px rgba(16,24,40,.12);--accent:#0C6B8F;
    --accent-soft:#DCEBF1;--steel:#0E7C93;--navy:#1F3A50;--navy-soft:#E4EBF3;--good:#1E7D46;--good-soft:#E1F1E7;
    --warn:#A9660A;--warn-soft:#F8EEDA;--risk:#C0362E;--risk-soft:#F9E4E1;
    
    --glow:0 0 0 1px rgba(12,107,143,.18), 0 8px 30px -8px rgba(30,50,70,.18);
    --shadow:0 10px 34px -14px rgba(20,35,55,.28);--aura:none;}
  :root[data-theme="dark"]{--bg:#080C12;--panel:#111A24;--panel2:#17222F;--side:#060A0F;--side-ink:#8195A9;
    --ink:#EAF1F8;--ink2:#A7B7C7;--muted:#6E8091;--line:#26343F;--line2:#1E2A36;--sh:0 1px 2px rgba(0,0,0,.4),0 6px 18px -4px rgba(0,0,0,.55);--sh-lg:0 18px 42px -10px rgba(0,0,0,.75),0 6px 14px -6px rgba(0,0,0,.5);--accent:#37AECF;
    --accent-soft:#0D2A36;--steel:#3AAFC9;--navy:#8FB4D1;--navy-soft:#16283A;--good:#5FD08B;--good-soft:#122A1B;
    --warn:#E0A03C;--warn-soft:#2E2410;--risk:#F0736A;--risk-soft:#331714;
    
    --glow:0 0 0 1px rgba(55,174,207,.20), 0 10px 40px -10px rgba(0,0,0,.6);
    --shadow:0 16px 50px -18px rgba(0,0,0,.7);
    --aura:radial-gradient(1150px 680px at 80% -10%, rgba(55,174,207,.09), transparent 58%), radial-gradient(950px 640px at 8% 112%, rgba(46,110,142,.06), transparent 55%);}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;display:flex;min-height:100vh;
    -webkit-font-smoothing:antialiased;letter-spacing:0;position:relative}
  body::before{content:"";position:fixed;inset:0;z-index:0;background:var(--aura);pointer-events:none;transition:opacity .4s ease}
  body>*{position:relative;z-index:1}
  /* плавное круговое раскрытие темы (View Transitions API) */
  ::view-transition-old(root),::view-transition-new(root){animation:none;mix-blend-mode:normal}
  ::view-transition-new(root){z-index:1}
  ::view-transition-old(root){z-index:0}
  button{font-family:var(--sans)}
  ::selection{background:var(--accent);color:#fff}
  button:focus-visible,input:focus-visible,select:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .search:focus,.userbox select:focus,.fields input:focus,.fields select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* ===== sidebar ===== */
  aside{width:216px;flex:none;background:var(--side);color:var(--side-ink);display:flex;flex-direction:column;
    padding:16px 12px;gap:2px;position:sticky;top:0;height:100vh;border-right:1px solid rgba(255,255,255,.05)}
  aside .logo{display:flex;align-items:center;gap:11px;font-weight:750;color:#fff;font-size:17px;padding:6px 8px 18px;letter-spacing:-.02em}
  aside .logo .dot{width:26px;height:26px;border-radius:8px;background:var(--accent);flex:none;position:relative}
  aside .logo .dot::after{content:"";position:absolute;inset:0;border-radius:8px;background:linear-gradient(180deg,transparent 52%,var(--side) 52%,var(--side) 68%,transparent 68%)}
  aside .logo small{font-family:var(--mono);font-size:8.5px;color:var(--side-ink);font-weight:400;margin-left:auto;letter-spacing:0;opacity:.7}
  aside nav button{display:flex;align-items:center;gap:11px;background:none;border:none;color:var(--side-ink);
    font-size:14px;font-weight:600;padding:11px 13px;border-radius:10px;cursor:pointer;text-align:left;width:100%;
    position:relative;transition:background .15s,color .15s;letter-spacing:-.01em}
  aside nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  aside nav button[aria-current="true"]{background:color-mix(in srgb,var(--accent) 22%,transparent);color:#fff;font-weight:650}
  aside nav button[aria-current="true"]::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
  svg.ic{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none}
  aside nav button svg.ic{opacity:.85}
  aside nav button[aria-current="true"] svg.ic{opacity:1}
  aside nav button .n{margin-left:auto;font-size:10.5px;background:#E5484D;color:#fff;border-radius:99px;padding:1px 7px;font-weight:700;min-width:18px;text-align:center;box-shadow:0 1px 3px rgba(229,72,77,.5)}
  /* ---- v1.40: сгруппированное меню под роли ---- */
  aside nav{display:flex;flex-direction:column;gap:2px}
  .navhead .gl{flex:1}
  .navhead{color:var(--side-ink)}
  .navhead .chev{margin-left:auto;width:13px;height:13px;opacity:.55;transition:transform .26s cubic-bezier(.16,1,.3,1)}
  .navgroup.open>.navhead .chev{transform:rotate(180deg);opacity:.9}
  .navbody{display:flex;flex-direction:column;gap:2px;overflow:hidden;max-height:0;opacity:0;
    transition:max-height .3s cubic-bezier(.16,1,.3,1),opacity .2s ease,margin .2s}
  .navgroup.open>.navbody{max-height:300px;opacity:1;margin:2px 0 4px}
  .navbody button{padding-left:36px;font-size:13.5px;font-weight:550}
  .navbody button svg.ic{width:15px;height:15px;opacity:.65}
  .navbody button[aria-current="true"] svg.ic{opacity:1}
  .navgroup.has-active:not(.open)>.navhead .gl::after{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--accent);margin-left:8px;vertical-align:middle;box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 28%,transparent)}
  /* ---- v1.40: ролевой хаб быстрых действий на «Сегодня» ---- */
  .hub{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0 22px}
  .hub-tile{display:flex;align-items:center;gap:12px;text-align:left;padding:16px 15px;border-radius:14px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);cursor:pointer;box-shadow:var(--sh);font:inherit;font-weight:650;font-size:14px;
    position:relative;transition:transform .16s cubic-bezier(.16,1,.3,1),box-shadow .16s,border-color .16s}
  .hub-tile:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--sh-lg)}
  .hub-tile:active{transform:translateY(-1px)}
  .hub-tile svg.ic{width:22px;height:22px;color:var(--accent);flex:none;stroke-width:1.7}
  .hub-tile .ht-l{flex:1;line-height:1.25}
  .hub-tile .ht-c{background:var(--accent-soft);color:var(--accent);border-radius:99px;padding:1px 9px;font-size:12px;font-weight:800;flex:none}
  .hub-tile svg.ic.ht-go{width:15px;height:15px;color:var(--muted);transform:rotate(-90deg);opacity:.55}
  .hub-tile:hover svg.ic.ht-go{color:var(--accent);opacity:1}
  @media(max-width:900px){.hub{grid-template-columns:1fr 1fr}}
  @media(max-width:520px){.hub{grid-template-columns:1fr}}
  /* ---- v1.41: бенчмарки флота + силуэт судна ---- */
  .hello-ship{position:relative;overflow:hidden}
  .hello-ship-art{position:absolute;right:8px;bottom:-8px;width:210px;height:80px;stroke:var(--accent);fill:none;stroke-width:1.6;opacity:.15;pointer-events:none;stroke-linecap:round;stroke-linejoin:round}
  @media(max-width:680px){.hello-ship-art{display:none}}
  .ai-strip{display:flex;gap:13px;align-items:flex-start;padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:var(--panel);box-shadow:var(--sh);margin:2px 0 16px;font-size:13.5px;color:var(--ink2);line-height:1.5}
  .ai-strip b{color:var(--ink)}
  .ai-strip svg.ic{width:22px;height:22px;color:var(--accent);flex:none;margin-top:1px}
  .bm-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .bm-filters .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .bm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:14px}
  .bm-card{border:1px solid var(--line);border-radius:16px;background:var(--panel);box-shadow:var(--sh);padding:16px 17px;display:flex;flex-direction:column;gap:11px;transition:transform .16s cubic-bezier(.16,1,.3,1),box-shadow .16s,border-color .16s}
  .bm-card:hover{transform:translateY(-3px);box-shadow:var(--sh-lg);border-color:color-mix(in srgb,var(--accent) 40%,var(--line))}
  .bm-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .bm-name{font-weight:750;font-size:15.5px;letter-spacing:-.01em}
  .bm-cls{font-size:12.5px;color:var(--muted);margin-top:2px}
  .bm-series{flex:none;font-size:11.5px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:99px;padding:3px 10px;white-space:nowrap}
  .bm-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:2px 0}
  .bm-metrics>div{background:var(--panel2);border-radius:10px;padding:8px 10px;text-align:center}
  .bm-metrics b{display:block;font-size:17px;font-weight:800;letter-spacing:-.02em}
  .bm-metrics span{font-size:10.5px;color:var(--muted)}
  .bm-sko{display:flex;flex-wrap:wrap;gap:6px}
  .bm-ins{font-size:12.8px;color:var(--ink2);line-height:1.45}
  .bm-tag{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:1px 7px;border-radius:6px;margin-right:6px;vertical-align:middle}
  .bm-tag.good{color:var(--good);background:var(--good-soft)}
  .bm-tag.acc{color:var(--accent);background:var(--accent-soft)}
  .bm-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:2px;padding-top:10px;border-top:1px solid var(--line2)}
  .bm-src{font-size:11px;color:var(--muted)}
  .bm-foot .btn.ghost{padding:5px 12px;font-size:12px}
  .bm-sko .stchip{font-size:11.5px}
  .stchip.sko-ok{color:var(--good)}
  .stchip.sko-gap{color:var(--accent);border:1px dashed color-mix(in srgb,var(--accent) 55%,transparent);background:transparent}
  .bm-gap{font-size:12.3px;color:var(--ink2);background:var(--panel2);border-radius:9px;padding:7px 11px}
  .bm-gap b{color:var(--good)}
  .gap-op{color:var(--accent);font-weight:600}
  .bm-legend{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin:-4px 0 14px;flex-wrap:wrap}
  .bm-legend span{display:inline-flex;align-items:center;gap:6px}
  .bm-legend i{width:11px;height:11px;border-radius:3px;display:inline-block;flex:none}
  .bm-btns{display:flex;gap:6px}
  .psec{margin:22px 0 10px;font-size:15px;color:var(--ink);font-weight:700;letter-spacing:-.01em}
  .psec:first-child{margin-top:4px}
  /* v1.49: прототип Т1 — кросс-орг взаимодействие в портале */
  .xorg{display:flex;align-items:stretch;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);flex-wrap:wrap}
  .xorg-side{display:flex;align-items:center;gap:11px;flex:1;min-width:180px}
  .xorg-side b{font-size:13.5px;display:block;letter-spacing:-.01em}
  .xorg-side small{font-size:11px;color:var(--muted)}
  .xdot{width:13px;height:13px;border-radius:50%;flex:none}
  .xdot.cloud{background:var(--steel);box-shadow:0 0 0 4px color-mix(in srgb,var(--steel) 26%,transparent)}
  .xdot.box{background:var(--navy);box-shadow:0 0 0 4px color-mix(in srgb,var(--navy) 22%,transparent)}
  .xorg-link{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex:none;padding:0 4px}
  .xarrow{font-size:18px;color:var(--muted);line-height:1}
  .xsync{font-family:var(--mono);font-size:10px;color:var(--good);white-space:nowrap}
  .xorg-note{font-size:12.3px;color:var(--ink2);line-height:1.5;margin-bottom:16px}
  .xorg-note b{color:var(--ink)}
  .xown-leg{display:flex;gap:16px;font-size:11px;color:var(--muted);margin:-2px 0 8px;flex-wrap:wrap}
  .xown-leg span{display:inline-flex;align-items:center;gap:5px}
  .xown-leg i{width:9px;height:9px;border-radius:3px;display:inline-block}
  .xown-leg i.sup{background:var(--accent)}.xown-leg i.yard{background:var(--good)}
  .xown{font-size:9.5px;font-weight:700;border-radius:6px;padding:2px 8px;white-space:nowrap;flex:none}
  .xown.sup{background:var(--accent-soft);color:var(--accent)}
  .xown.yard{background:var(--good-soft);color:var(--good)}
  .xtag{display:inline-block;font-size:9.5px;font-weight:700;border-radius:5px;padding:1px 7px;vertical-align:middle}
  .xtag.ext{background:var(--good-soft);color:var(--good)}
  .xtag.int{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .xtoggle{display:inline-flex;align-items:center;gap:7px;margin-top:8px;font-size:11.5px;color:var(--ink2);cursor:pointer;user-select:none}
  .xtoggle input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
  .xfeed-note{font-size:11.5px;color:var(--muted);margin:2px 0 10px;line-height:1.5}
  .elx-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .elx-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line2);flex-wrap:wrap;font-size:12.3px}
  .elx-dir{font-weight:700;font-size:10.5px;border-radius:6px;padding:2px 8px;white-space:nowrap;flex:none}
  .elx-dir.out{background:var(--accent-soft);color:var(--accent)}
  .elx-dir.in{background:var(--good-soft);color:var(--good)}
  .elx-id{font-family:var(--mono);font-size:11px;color:var(--ink);font-weight:600}
  .elx-note{color:var(--ink2);flex:1;min-width:120px}
  .elx-sig{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
  .panel.wiz{border:1.5px solid color-mix(in srgb,var(--accent) 45%,var(--line));box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 8%,transparent),var(--sh)}
  .wiz-steps{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 14px}
  .wiz-step{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:6px 14px 6px 6px}
  .wiz-step span{width:22px;height:22px;border-radius:50%;background:var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none}
  .wiz-step.on{color:var(--ink);border-color:color-mix(in srgb,var(--accent) 45%,var(--line))}
  .wiz-step.on span{background:var(--accent);color:#fff}
  .wiz-step.ok span{background:var(--good)}
  .wiz-step.ok{color:var(--good)}
  /* v1.58: двухпанельные настройки (рубрикатор слева) — как Ozon/Яндекс/Bitrix */
  .set-wrap{display:grid;grid-template-columns:236px 1fr;gap:20px;align-items:start}
  .set-rail{position:sticky;top:78px;display:flex;flex-direction:column;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px;box-shadow:var(--sh)}
  .set-cat{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;background:none;border:none;cursor:pointer;text-align:left;width:100%;font:inherit;font-size:13.5px;font-weight:600;color:var(--ink2);transition:background .15s,color .15s;position:relative}
  .set-cat:hover{background:var(--panel2);color:var(--ink)}
  .set-cat.on{background:var(--accent-soft);color:var(--accent)}
  .set-cat.on::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
  .set-cat svg.ic{width:17px;height:17px;flex:none;opacity:.8}
  .set-cat.on svg.ic{opacity:1}
  .set-main{min-width:0}
  .set-sec[hidden]{display:none}
  @media(max-width:860px){.set-wrap{grid-template-columns:1fr}.set-rail{position:static;flex-direction:row;overflow-x:auto;flex-wrap:nowrap;top:0}.set-cat{white-space:nowrap}.set-cat.on::before{display:none}}
  .bench-dealpick{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 14px}
  .bench-dealpick label{font-size:13px;font-weight:600;color:var(--ink2)}
  .bench-dealpick select{font:inherit;font-size:13.5px;font-weight:600;padding:9px 13px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);box-shadow:var(--sh);cursor:pointer;min-width:260px;max-width:100%}
  .bench-dealpick select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .deal-band{display:flex;gap:12px;align-items:flex-start;padding:13px 16px;border-radius:13px;margin-bottom:14px;font-size:13.3px;
    color:var(--ink2);line-height:1.5;background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent)}
  .deal-band b{color:var(--ink)}
  .deal-band svg.ic{width:20px;height:20px;color:var(--accent);flex:none;margin-top:1px}
  .deal-band.nomatch{background:var(--panel2);border-color:var(--line);color:var(--muted)}
  .deal-band.nomatch b{color:var(--ink2)}
  .bm-cmp{border:1px solid var(--accent);border-radius:16px;background:var(--panel);box-shadow:var(--sh-lg);padding:18px 20px;margin-bottom:18px;animation:cardIn .3s cubic-bezier(.16,1,.3,1)}
  .bm-cmp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
  .bm-cmp-head b{font-size:16px;font-weight:750;display:block}
  .bm-cmp-head span{font-size:12.5px;color:var(--muted)}
  .bm-cmp-loc{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
  .loc-row{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--ink2)}
  .loc-row>span{width:135px;flex:none}
  .loc-row b{width:44px;text-align:right;font-weight:800}
  .loc-bar{flex:1;height:9px;border-radius:99px;background:var(--panel2);overflow:hidden}
  .loc-bar i{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .5s cubic-bezier(.16,1,.3,1)}
  .loc-bar i.t{background:var(--good)}
  .loc-note{font-size:12px;color:var(--muted)}
  .bm-cmp-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:6px}
  @media(max-width:760px){.bm-cmp-cols{grid-template-columns:1fr}}
  .bm-cmp-cols h5{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;font-weight:700}
  .cmp-item{display:flex;align-items:center;gap:9px;font-size:13px;padding:6px 0;border-top:1px solid var(--line2)}
  .cmp-item .ci-ic{width:18px;height:18px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none}
  .cmp-item.ok .ci-ic{background:var(--good-soft);color:var(--good)}
  .cmp-item.gap .ci-ic{background:var(--accent-soft);color:var(--accent)}
  .cmp-item .ci-tag{margin-left:auto;font-size:10.5px;font-weight:700}
  .cmp-item.ok .ci-tag{color:var(--good)}
  .cmp-item.gap .ci-tag{color:var(--accent)}
  .bm-cmp-foot{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-top:12px;padding-top:14px;border-top:1px solid var(--line);font-size:13px;color:var(--ink2)}
  @media(max-width:640px){.bm-cmp-foot{flex-direction:column;align-items:stretch}}
  .wl-ship{display:block;width:min(300px,72%);height:auto;stroke:var(--accent);fill:none;stroke-width:1.5;opacity:.92;margin:10px 0 2px;stroke-linecap:round;stroke-linejoin:round}
  /* v1.44: фоновый силуэт судна на заднем плане продукта (по референсу траулера) */
  .appship{position:fixed;right:-26px;bottom:-14px;width:min(44vw,540px);height:auto;z-index:0;pointer-events:none;
    stroke:var(--ink);fill:none;stroke-width:1.3;opacity:.05;stroke-linecap:round;stroke-linejoin:round}
  :root[data-theme="dark"] .appship{opacity:.07}
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]) .appship{opacity:.07}}
  @media(max-width:860px){.appship{display:none}}
  aside .create{margin:16px 4px 6px}
  aside .create button{width:100%;background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 88%,#fff),var(--accent) 70%);color:#fff;border:none;border-radius:12px;padding:12px;font-weight:600;font-size:14px;cursor:pointer;
    box-shadow:0 2px 8px -2px color-mix(in srgb,var(--accent) 55%,transparent),inset 0 1px 0 rgba(255,255,255,.22);transition:filter .15s;letter-spacing:-.01em}
  aside .create button:hover{filter:brightness(1.05)}
  aside .bottom{margin-top:auto;padding:10px 12px;font-family:var(--mono);font-size:10px;line-height:1.6;color:var(--side-ink);opacity:.6}

  /* ===== main ===== */
  main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:12px;padding:15px 30px;background:var(--panel);
    border-bottom:1px solid var(--line2);flex-wrap:wrap;position:sticky;top:0;z-index:30}
  /* сигнатура: шпангоутная линейка — засечки плазовой разбивки корпуса вдоль нижнего края шапки */
  .topbar::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:6px;pointer-events:none;
    background:repeating-linear-gradient(90deg,var(--accent) 0 1px,transparent 1px 24px);
    -webkit-mask:linear-gradient(180deg,transparent,#000);mask:linear-gradient(180deg,transparent,#000);opacity:.28}
  .topbar h1{font-size:20px;margin:0;font-weight:760;letter-spacing:-.025em}
  .topbar .crumb{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.02em}
  .topbar .spacer{flex:1}
  .search-wrap{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid transparent;border-radius:10px;padding:0 12px;width:270px;transition:background .15s,border-color .15s,box-shadow .15s}
  .search-wrap:hover{background:var(--line2)}
  .search-wrap:focus-within{background:var(--panel);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .search-ic{width:16px;height:16px;color:var(--muted);flex:none}
  .search{background:none;border:none;padding:9px 0;font-size:13.5px;color:var(--ink);width:100%;font-family:var(--sans);outline:none}
  .userbox{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2)}
  .userbox select{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 11px;color:var(--ink);font-size:13px;font-family:var(--sans);cursor:pointer;transition:border-color .15s}
  .userbox select:hover{border-color:var(--muted)}
  .icobtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);
    color:var(--ink2);display:grid;place-items:center;font-size:15px;cursor:pointer;flex:none}
  .icobtn:hover{border-color:var(--accent);color:var(--accent)}
  .bell-wrap{position:relative}
  .bell-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:99px;
    background:var(--accent);color:#fff;font-size:9px;font-weight:700;display:none;place-items:center;padding:0 4px;font-family:var(--mono)}
  .bell-badge.on{display:grid}
  .bell-drop{position:absolute;top:44px;right:0;width:340px;max-height:420px;overflow-y:auto;z-index:70;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 40px rgba(10,20,30,.25);
    padding:8px;display:none}
  .bell-drop.open{display:block}
  .bell-drop h5{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
    padding:8px 10px;margin:0;display:flex;justify-content:space-between;align-items:center}
  .bell-drop h5 button{font-family:var(--sans);font-size:11px;color:var(--accent);cursor:pointer;background:none;border:none}
  .note{display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px}
  .note:hover{background:var(--panel2)}
  .note.unread{background:var(--accent-soft)}
  .note .dot2{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none;margin-top:5px}
  .note .dot2.read{background:transparent}
  .note .k{font-family:var(--mono);font-size:10px;color:var(--muted);display:block}
  .note-ch{display:inline-block;margin-top:4px;font-size:10.5px;font-weight:600;color:var(--steel);
    background:color-mix(in srgb,var(--steel) 12%,var(--panel));border-radius:6px;padding:1px 7px}
  .toggle{position:relative;width:38px;height:22px;border-radius:99px;background:var(--line);border:none;cursor:pointer;flex:none;transition:background .18s}
  .toggle.on{background:var(--accent)}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 2px rgba(16,24,40,.3)}
  .toggle.on::after{transform:translateX(16px)}
  .due{font-family:var(--mono);font-size:9.5px;color:var(--muted);border:1px solid var(--line);
    border-radius:99px;padding:1px 7px;white-space:nowrap}
  .due.over{color:var(--risk);border-color:var(--risk);font-weight:700}
  .lnk{display:inline-flex;gap:6px;align-items:center;font-family:var(--mono);font-size:10.5px;
    border:1px solid var(--line);border-radius:8px;padding:4px 10px;color:var(--ink2);cursor:pointer;margin:0 6px 6px 0}
  .lnk:hover{border-color:var(--accent);color:var(--accent)}
  .lnk.block{border-color:var(--risk);color:var(--risk)}
  .content{padding:26px 30px 64px;overflow-x:hidden;scrollbar-width:auto;scrollbar-color:color-mix(in srgb,var(--muted) 60%,transparent) transparent}
  .content::-webkit-scrollbar{width:13px}
  .content::-webkit-scrollbar-track{background:transparent}
  .content::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 55%,transparent);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
  .content::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  /* v1.57: комфортная длина строки текста на широких экранах (карточки остаются во всю ширину) */
  .panel>p,.xorg-note,.hello small{max-width:82ch}
  /* живой переход между экранами + мягкое появление карточек */
  @keyframes viewIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .view-in{animation:viewIn .34s cubic-bezier(.16,1,.3,1)}
  .view-in .stats .stat{animation:cardIn .42s cubic-bezier(.16,1,.3,1) backwards}
  .view-in .stats .stat:nth-child(1){animation-delay:.03s}
  .view-in .stats .stat:nth-child(2){animation-delay:.07s}
  .view-in .stats .stat:nth-child(3){animation-delay:.11s}
  .view-in .stats .stat:nth-child(4){animation-delay:.15s}
  .view-in .stats .stat:nth-child(5){animation-delay:.19s}
  .view-in .stats .stat:nth-child(n+6){animation-delay:.22s}
  .view-in .panel,.view-in .anacard,.view-in .wcard{animation:cardIn .46s cubic-bezier(.16,1,.3,1) backwards;animation-delay:.06s}
  @media (prefers-reduced-motion:reduce){.view-in,.view-in *{animation:none!important}}
  @media(max-width:720px){.content{padding:18px 16px 56px}}

  .av{width:28px;height:28px;border-radius:50%;display:inline-grid;place-items:center;color:#fff;font-size:11px;font-weight:700;flex:none;vertical-align:middle;box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),0 1px 2px rgba(16,24,40,.14)}
  .btn{background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 88%,#fff),var(--accent) 70%);color:#fff;border:none;border-radius:11px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;
    box-shadow:0 1px 2px rgba(16,24,40,.14),0 2px 6px -2px color-mix(in srgb,var(--accent) 50%,transparent),inset 0 1px 0 rgba(255,255,255,.22);transition:filter .15s,box-shadow .15s,transform .08s;letter-spacing:-.01em}
  .btn:hover{filter:brightness(1.05);box-shadow:0 2px 4px rgba(16,24,40,.16),0 4px 12px -2px color-mix(in srgb,var(--accent) 55%,transparent),inset 0 1px 0 rgba(255,255,255,.22)}
  .btn:active{transform:translateY(.5px);filter:brightness(.96)}
  .btn.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);box-shadow:var(--sh)}
  .btn.ghost:hover{border-color:var(--muted);filter:none;background:var(--panel2)}
  .btn.big{padding:11px 22px;font-size:14px}
  .chip{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--ink2);cursor:pointer;transition:border-color .14s,background .14s,color .14s}
  .chip:hover{border-color:var(--muted);color:var(--ink)}
  .chip[aria-pressed="true"]{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);font-weight:700}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 16px;align-items:center}
  .chips .lbl{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-right:2px}

  /* === дорогая поверхность: слоистая элевация, крупный радиус, светлые границы === */
  .panel,.wcard,.evfeed,.stat,.flow-wrap,.anacard,.kbcard,.ocard,.card,.mod,.role,.pain,.tcard,.bell-drop{
    border-color:var(--line2);box-shadow:var(--sh)}
  .col{border-color:var(--line2)}
  .panel,.wcard,.evfeed,.anacard,.kbcard,.ocard,.flow-wrap,.card,.mod,.role,.pain{border-radius:18px}
  .stat{border-radius:16px}
  /* мягкий цвет статусов (soft-fill по собственному цвету, как в Яндекс/Linear) */
  .stchip{background:color-mix(in srgb, currentColor 13%, var(--panel))}
  /* пастельные KPI-плашки как карточки Яндекс Пэй (цвет по позиции) */
  .stats .stat:nth-child(5n+1){background:color-mix(in srgb,var(--accent) 7%,var(--panel));border-color:color-mix(in srgb,var(--accent) 16%,var(--line2))}
  .stats .stat:nth-child(5n+2){background:color-mix(in srgb,var(--steel) 8%,var(--panel));border-color:color-mix(in srgb,var(--steel) 16%,var(--line2))}
  .stats .stat:nth-child(5n+3){background:color-mix(in srgb,var(--good) 8%,var(--panel));border-color:color-mix(in srgb,var(--good) 16%,var(--line2))}
  .stats .stat:nth-child(5n+4){background:color-mix(in srgb,var(--navy) 8%,var(--panel));border-color:color-mix(in srgb,var(--navy) 16%,var(--line2))}
  .stats .stat:nth-child(5n+5){background:color-mix(in srgb,var(--warn) 8%,var(--panel));border-color:color-mix(in srgb,var(--warn) 16%,var(--line2))}
  .wcard,.kbcard,.anacard,.ocard,.mod,.role,.pain,.tcard{transition:border-color .18s,box-shadow .2s,transform .2s}
  .wcard:hover,.kbcard:hover,.anacard:hover,.ocard:hover{border-color:var(--line);box-shadow:var(--sh-lg)}
  .bell-drop{box-shadow:var(--sh-lg);border-radius:14px}
  .modal{box-shadow:var(--sh-lg)}
  .tsec h3 .cnt{background:var(--panel2);color:var(--ink2);border:1px solid var(--line);font-weight:700}
  .step.current .node{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .content{scroll-behavior:smooth}

  /* ===== TODAY ===== */
  .hello{font-size:25px;font-weight:760;letter-spacing:-.022em;margin:2px 0 4px}
  .hello small{display:block;font-size:13.5px;color:var(--muted);font-weight:400;margin-top:2px}
  .today{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;align-items:start;margin-top:16px}
  @media(max-width:920px){.today{grid-template-columns:1fr}}
  .tsec h3{font-size:15px;letter-spacing:-.01em;color:var(--ink);margin:0 0 10px;font-weight:700;display:flex;gap:8px;align-items:center}
  .tsec h3 .cnt{border-radius:99px;font-size:11px;padding:1px 8px;font-family:var(--mono)}
  .wcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:17px 20px;margin-bottom:12px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;cursor:pointer}
  .wcard:hover{border-color:var(--accent)}
  .wcard.urgent{border-color:var(--risk);background:var(--risk-soft,var(--panel2))}
  .wcard .body{flex:1;min-width:220px}
  .wcard .k{font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .wcard .t{font-size:15px;font-weight:660;color:var(--ink);line-height:1.35;margin:2px 0 4px}
  .wcard .why{font-size:12.5px;color:var(--ink2)}
  .wcard .why b{color:var(--accent)}
  .wcard .sla{font-family:var(--mono);font-size:10px;color:var(--risk);border:1px solid var(--risk);border-radius:99px;padding:2px 8px;white-space:nowrap}
  .zero{background:var(--good-soft);border-radius:14px;padding:18px;color:var(--good);font-weight:650;font-size:14px}
  .evfeed{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .evfeed .ev{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line2);font-size:13px;color:var(--ink2)}
  .evfeed .ev:last-child{border-bottom:none}
  .evfeed .t{font-family:var(--mono);font-size:10px;color:var(--muted);width:46px;flex:none;padding-top:2px}
  .evfeed b{color:var(--ink)}
  .nocall{display:inline-block;font-family:var(--mono);font-size:9px;color:var(--good);border:1px solid var(--good);border-radius:99px;padding:0 6px;margin-left:5px}

  /* ===== FLOW MAP (Поток заказов) ===== */
  .legend{display:flex;gap:16px;align-items:center;margin:0 0 12px;font-size:12.5px;color:var(--ink2);flex-wrap:wrap}
  .ldot{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:-1px;margin-right:5px}
  .flow-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
  table.flow{border-collapse:collapse;min-width:1080px;width:100%}
  .flow th{font-size:11px;color:var(--muted);
    padding:12px 6px;border-bottom:1px solid var(--line);font-weight:600;text-align:center;background:var(--panel)}
  .flow th:first-child{text-align:left;padding-left:18px;position:sticky;left:0;background:var(--panel);z-index:2;min-width:240px}
  .flow th.goz{color:var(--accent)}
  .flow td{border-bottom:1px solid var(--line2);padding:0;height:66px;position:relative;text-align:center;transition:background .12s}
  .flow tr:last-child td{border-bottom:none}
  .flow td.oc{position:sticky;left:0;background:var(--panel);z-index:1;text-align:left;padding:11px 16px;cursor:pointer;min-width:240px}
  .flow tbody tr:hover td, .flow tr:hover td{background:var(--panel2)}
  .flow tr:hover td.oc{background:var(--panel2)}
  .flow .onum{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .flow .onm{font-size:13.5px;font-weight:680;line-height:1.3}
  .flow .ocust{font-size:11px;color:var(--muted)}
  .track{position:absolute;top:50%;left:0;right:0;height:4px;transform:translateY(-50%);background:var(--line2)}
  .track.fill{background:var(--good)}
  .track.half-l{right:50%}
  .track.half-r{left:50%}
  .puck{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;
    min-width:34px;height:26px;border-radius:99px;display:grid;place-items:center;
    color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;padding:0 8px;cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,.25)}
  .dotdone{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:var(--good)}
  .flow-hint{font-size:12.5px;color:var(--muted);margin-top:10px;max-width:60em}

  /* board */
  .board-wrap{overflow-x:auto;padding-bottom:10px}
  .board{display:grid;grid-template-columns:repeat(4,minmax(235px,1fr));gap:12px;align-items:start;min-width:960px}
  .col{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:9px;min-height:120px;transition:background .15s,border-color .15s,box-shadow .15s}
  .col.dragover{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 2px var(--accent)}
  .col h3{font-size:13px;color:var(--ink2);
    margin:2px 4px 9px;display:flex;justify-content:space-between;font-weight:700;letter-spacing:-.01em}
  .col h3 .wip{color:var(--warn)}
  .tcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:grab}
  .tcard:hover{border-color:var(--accent);box-shadow:var(--sh)}
  .tcard:active{cursor:grabbing}
  .tcard.dragging{opacity:.55;transform:scale(.97) rotate(1.4deg);box-shadow:var(--sh-lg);cursor:grabbing}
  @keyframes cardPop{0%{transform:scale(1)}30%{transform:scale(1.04)}100%{transform:scale(1)}}
  .tcard.moved{animation:cardPop .45s cubic-bezier(.16,1,.3,1);border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .tcard .top{display:flex;gap:8px;align-items:center;margin-bottom:3px}
  .tcard .key{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .prio{font-weight:800;font-size:12px}
  .prio.hi{color:var(--accent)} .prio.md{color:var(--warn)} .prio.lo{color:var(--muted)}
  .tcard .sla{font-family:var(--mono);font-size:9px;color:var(--accent);border:1px solid var(--accent);border-radius:99px;padding:1px 6px;margin-left:auto}
  .tcard .ttl{font-size:13.5px;font-weight:620;color:var(--ink);line-height:1.35;margin-bottom:8px}
  .tcard .meta{display:flex;align-items:center;gap:7px}
  .etag{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:99px;white-space:nowrap;max-width:135px;overflow:hidden;text-overflow:ellipsis}
  .tcard .est{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-left:auto}

  /* planning (ex-backlog) */

/* ---- серверная синхронизация (v0.5): SSE-пуш, журнал аудита, подпись действий ---- */
const SRV = { on:false, rev:0, es:null };
const TOK = () => (window.__ELLING_TOKEN || '');   // токен инъектируется сервером в same-origin index.html
const AH = extra => Object.assign({'X-API-Token': TOK()}, extra||{});
let ACTS = [];            // накопитель описаний действий (ревью v0.5: не терять при дебаунсе)
let SYNCING = false;      // рендер по данным с сервера не должен порождать обратный пуш (эхо-цикл)
const SHARED = ['orders','epics','seq','tasks','deals','suppliers','certs','notices','estimates','portalDocs','portalQA','connectors','agentLog','docs','projects','kbProjects','checklists','drawings','rules','notes','savedFilters','portalAccept','notifCh','elxLog'];
// Дедуп автоматизаций живёт на самой задаче (t.autoFired) — задачи синкаются, поэтому
// повторное срабатывание в другой вкладке/клиенте не задваивает комментарии и лог (ревью v1.15)
function sharedData(){ const o={}; SHARED.forEach(k=>o[k]=S[k]); return o; }
function adoptShared(d){ if(!d) return; SHARED.forEach(k=>{ if(d[k]!==undefined) S[k]=d[k]; }); }
function setSrv(on){ SRV.on = on; const el = $('srvState');
  if(el) el.textContent = on ? `сервер: live · rev ${SRV.rev}` : 'локальный режим (без сервера)'; }
let pushT = null;
let kbReqSeq = 0;
function queuePush(){ if(!SRV.on || SYNCING) return; clearTimeout(pushT); pushT = setTimeout(pushState, 700); }
async function pushState(){
  clearTimeout(pushT); pushT = null;
  const acts = ACTS; ACTS = [];
  try{
    const r = await fetch('/api/state', {method:'PUT', headers:AH({'Content-Type':'application/json'}),
      body: JSON.stringify({rev:SRV.rev, data:sharedData(),
        user: PEOPLE[S.currentUser].full + ' · ' + PEOPLE[S.currentUser].role,
        action: acts.join('; ') || 'изменение данных'})});
    if(r.status===409){ const j = await r.json();
      // наш push отклонён (устаревший rev) — НЕ теряем локальные правки (напр. аннотацию):
      // обновляем rev и повторяем отправку, сервер сольёт наши правки по сущностям (ревью v1.1)
      SRV.rev = j.rev; ACTS = acts.concat(ACTS); setSrv(true); queuePush(); return; }
    if(r.ok){ const j = await r.json(); SRV.rev = j.rev; setSrv(true); }
    else ACTS = acts.concat(ACTS);
  }catch(e){ ACTS = acts.concat(ACTS); setSrv(false); }
}
async function pullState(){
  if(pushT){ await pushState(); }  // сначала доставляем свои несохранённые правки, потом принимаем чужие
  try{
    const s = await (await fetch('/api/state', {cache:'no-store', headers:AH()})).json();
    if(s.rev > SRV.rev){
      SYNCING = true; adoptShared(s.data); SRV.rev = s.rev; renderBg(); SYNCING = false;
    }
    setSrv(true);
  }catch(e){ setSrv(false); }
}
function startStream(){
  if(!window.EventSource){ setInterval(pullState, 8000); return; }
  try{
    SRV.es = new EventSource('/api/stream?token='+encodeURIComponent(TOK()));
    SRV.es.onmessage = e=>{
      try{ const j = JSON.parse(e.data); if(j.rev > SRV.rev) pullState(); else setSrv(true); }catch(x){}
    };
    SRV.es.onerror = ()=>{
      setSrv(false);
      try{ SRV.es.close(); }catch(x){}
      setTimeout(()=>{ pullState(); startStream(); }, 5000);
    };
  }catch(e){ setInterval(pullState, 8000); }
}
async function bootstrapSrv(){
  if(!/^https?:$/.test(location.protocol)) return;
  try{
    const r = await fetch('/api/state', {cache:'no-store', headers:AH()});
    if(!r.ok) return;
    const j = await r.json();
    SRV.rev = j.rev || 0;
    if(j.data){ SYNCING = true; adoptShared(j.data); SYNCING = false; }
    else { SRV.on = true; ACTS.push('первичная загрузка демо-данных'); await pushState(); }
    setSrv(true); render();
    startStream();
    setInterval(pullState, 30000); // страховочный редкий поллинг
  }catch(e){ setSrv(false); }
}

function dwgZoom(factor, cx, cy){

  const px = (cx==null? stage.left+stage.width/2 : cx), py = (cy==null? stage.top+stage.height/2 : cy);

}

  const rows=keys.map(k=>{ const a=mine[k]||null, b=ana[k]||null;
    const st=(a&&b)?(a.toLowerCase()===b.toLowerCase()?'match':'diff'):'partial';
    return {k, mine:a||'—', ana:b||'—', st}; });
  const matched=rows.filter(r=>r.st==='match').length, diff=rows.filter(r=>r.st==='diff').length;

function kbSearchProjects(q){
  const tokens = (q||'').toLowerCase().split(/[^a-zа-яё0-9-]+/).filter(t=>t.length>1);
  if(!tokens.length) return [];
  const codeRe = /^[а-яёa-z]{1,4}[-–]?\d/i;
  return (S.kbProjects||[]).map(p=>{
    const text = (p.izdelie+' '+p.tz+' '+p.tags+' '+p.code).toLowerCase();
    const words = text.split(/[^a-zа-яё0-9-]+/);
    let score=0; const matched=[];
    tokens.forEach(t=>{
      let s=0;
      if(words.includes(t)) s=3; else if(words.some(w=>w.startsWith(t))) s=2; else if(text.includes(t)) s=1.2;
      if(s && codeRe.test(t)) s*=1.8;
      if(s){ score+=s; matched.push(t); }
    });
    const coverage = matched.length/tokens.length;
    const pct = Math.min(98, Math.round(score*coverage/(tokens.length*3)*100));
    const uniq = [...new Set(matched)];
    const factorOf = t => codeRe.test(t) ? 'обозначение'
      : (/^\d/.test(t) || /^(бар|мм|кв?т|°|м³|н\/ч)$/i.test(t) || /^ду-?\d/i.test(t)) ? 'параметр' : 'смысл';
    return { p, pct, matched:uniq, factors:uniq.map(t=>({t,k:factorOf(t)})) };
  }).filter(x=>x.pct>0).sort((a,b)=>b.pct-a.pct);
}

  (q.match(/ду\s?-?\s?\d+/gi)||[]).forEach(x=>add('условный проход '+x.toUpperCase().replace(/\s/g,'')));
  [['бронз','материал: бронза'],['титан','материал: титан'],['сталь','материал: сталь'],['нержав','материал: нержавейка'],['латун','материал: латунь']].forEach(([k,l])=>{ if(new RegExp(k,'i').test(q)) add(l); });

function notify(userIds, text, taskKey){

/* Движок: срабатывает при изменениях и по таймеру. Идемпотентен — каждое правило
   для задачи срабатывает один раз (ключ в t.autoFired, живёт на задаче и синкается),
   плюс контентные гварды на push, чтобы не задваивать при гонке между клиентами. */
function runAutomations(trigger, task){
  S.rules = S.rules || [];
  let changed = false;
  const fire = (rule, t, key) => {
    t.autoFired = t.autoFired || [];
    if(t.autoFired.includes(key)) return;
    t.autoFired.push(key); changed = true;
    const recips = [t.who, ...(t.watchers||[])];
    if(rule.act.comment){
      t.comments = t.comments||[];
      const cm = `Задача просрочена (срок ${t.due}). Требуется внимание.`;
      if(!t.comments.some(c=>c.a==='⚙ Автоматизация' && c.m===cm)) t.comments.push({a:'⚙ Автоматизация', m:cm});
    }
    if(rule.act.prio && t.prio!=='hi'){ t.prio='hi'; const pl='автоматизация: приоритет поднят до высокого'; if(!t.log.includes(pl)) t.log.push(pl); }
    if(rule.act.notify){
      // текст по триггеру ПРАВИЛА, а не по аргументу вызова (ревью v0.9)
      const txt = rule.trigger==='overdue' ? `просрочена: ${t.ttl.slice(0,50)}`
        : rule.trigger==='to_rev' ? `ждёт согласования: ${t.ttl.slice(0,50)}` : `изменилась: ${t.ttl.slice(0,50)}`;
      notify(rule.trigger==='to_rev' ? ['maksimov', ...recips] : recips, txt, t.key);
    }
    const lm = `автоматизация «${rule.name.slice(0,40)}»`;
    if(!t.log.includes(lm)) t.log.push(lm);
    ACTS.push(`автоматизация: ${rule.name.slice(0,30)} → ${t.key}`);
  };
  S.rules.filter(r=>r.enabled).forEach(rule=>{
    if(rule.trigger==='overdue'){
      S.tasks.forEach(t=>{ const di=dueInfo(t);
        if(di && di.over && !(rule.id==='R3' && !t.sla)) fire(rule, t, rule.id+':'+t.key+':'+t.due); });
    } else if(rule.trigger==='to_rev' && trigger==='to_rev' && task && task.col==='rev'){
      fire(rule, task, rule.id+':'+task.key+':rev:'+(task.log.length));
    }
  });
  if(changed) save();
  return changed;
}

  if(t.col==='open') return ['wip','Взять в работу'];
  if(t.col==='wip')  return ['rev','Отдать на согласование'];

}
function moveTask(t,to,how){
  const old=t.col; t.col=to;
  t.log.push(`статус: ${STNAME[old]} → ${STNAME[to]} (${how||PEOPLE[S.currentUser].full})`);
  ACTS.push(`${t.key}: ${STNAME[old]} → ${STNAME[to]}`);

function certDays(c){ return Math.ceil((new Date(c.until+'T23:59:59') - new Date())/86400000); }
function supplyAlerts(){
  const reg=(S.suppliers||[]).filter(s=>s.reg!=='ok').length;

      ${certs.map(c=>{ const d=certDays(c); const st=d<0?['var(--risk)','просрочен '+(-d)+' дн']:d<180?['var(--warn)','истекает через '+d+' дн']:['var(--good)','действует'];

          <span class="vv" style="color:${st[0]}">${st[1]}</span></div>`; }).join('')}`;
  }
  const alerts=(S.suppliers||[]).filter(s=>s.reg!=='ok');
  return head+`<div class="stats" style="margin-bottom:16px">
      <div class="stat"><div class="v">${(S.suppliers||[]).length}</div><div class="l">позиций под контролем снабжения</div></div>
      <div class="stat"><div class="v" style="-webkit-text-fill-color:${alerts.length?'var(--risk)':'var(--good)'};color:${alerts.length?'var(--risk)':'var(--good)'}">${alerts.length}</div><div class="l">проблем с реестровостью ПП 719</div></div>
      <div class="stat"><div class="v">${(S.suppliers||[]).filter(s=>s.repl&&s.repl!=='—').length}</div><div class="l">согласованных замен в памяти</div></div>
    </div>
    <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px">Память строится вокруг пары «позиция ↔ проверенные источники + согласованные замены + история срывов». Реестровость РРПП/ЕРПТ проверяется автоматически — запись может быть аннулирована без уведомления.</p>
    ${(S.suppliers||[]).map(s=>`<div class="anacard" style="cursor:default">
      <div class="ana-top">
        <div><div class="ana-name">${esc(s.position)}</div>
          <div class="ana-meta">заказ №${esc(s.order)}</div></div>
        <span class="stchip" style="color:${REG_ST[s.reg][0]};border:1px solid ${REG_ST[s.reg][0]}">ПП 719: ${REG_ST[s.reg][1]}</span>

        <div><div style="font-weight:600;color:var(--ink);font-size:13px">${esc(src.name)} <span class="stchip" style="color:${REL_ST[src.rel][0]};border:1px solid ${REL_ST[src.rel][0]};font-size:9px">${REL_ST[src.rel][1]}</span></div>
          <div style="font-size:11.5px;color:var(--ink2)">${esc(src.note)}</div></div></div>`).join('')}</div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--ink2);padding-top:10px;border-top:1px solid var(--line2)">

function portalOrders(){ return (S.orders||[]).filter(o=>o.stage>=4); }
function portalPending(){ return (S.portalQA||[]).filter(q=>!q.a).length; }
function curPortalOrder(){ const os=portalOrders(); return os.find(o=>o.id===S.portalOrder)?S.portalOrder:(os[0]&&os[0].id); }

      <div class="xorg-side"><span class="xdot box"></span><div><b>Верфь / ВП</b><small>закрытый контур · внешний участник</small></div></div>

    <div class="addline" style="margin-top:12px"><input id="portalAsk" placeholder="Задать вопрос от лица заказчика"><button class="btn ghost" id="portalAskBtn">Задать вопрос</button></div>

/* ---- Просчёт: очередь оценки ТЗ в ИЦ с SLA (отклик 4ч + просчёт 3 дн) — лечит бутылочное горлышко конверсии ---- */
const EST_SRC={tender:'тендер ЕИС',mail:'почтовый шлюз',deal:'из сделки',call:'звонок'};
const EST_ST={new:['В очереди','var(--warn)'],wip:['В работе','var(--steel)'],done:['Просчитано','var(--good)'],declined:['Отклонено','var(--muted)']};
function estById(id){ return (S.estimates||[]).find(e=>e.id===id); }
function estAckLeft(e){ return e.ackSlaMin - e.ageMin; }
function estDueLeft(e){ return e.estSlaMin - e.ageMin; }
function estAckOverdue(e){ return e.status==='new' && estAckLeft(e)<0; }
function estDueOverdue(e){ return (e.status==='new'||e.status==='wip') && estDueLeft(e)<0; }
function estOverdue(e){ return estAckOverdue(e)||estDueOverdue(e); }
function estAlerts(){ return (S.estimates||[]).filter(estOverdue).length; }
function fmtDur(m){ m=Math.round(Math.abs(m)); const d=Math.floor(m/1440),h=Math.floor(m%1440/60),mm=m%60; return d?`${d} дн ${h} ч`:h?`${h} ч ${mm} мин`:`${mm} мин`; }
function estResFill(e){ const h=e.resHours!=null?e.resHours:40; const s=e.resSum!=null?e.resSum:(e.dealId&&dealById(e.dealId)?dealById(e.dealId).sum:5000000); return [h,s]; }
function vEstimates(){
  const all=S.estimates||[]; const f=S.estFilter||'all';
  const shown = f==='queue'?all.filter(e=>e.status==='new')
    : f==='overdue'?all.filter(estOverdue)
    : all.slice();
  const rank={new:0,wip:1,done:2,declined:3};
  shown.sort((a,b)=>(estOverdue(b)-estOverdue(a))||((rank[a.status]??9)-(rank[b.status]??9))||(estDueLeft(a)-estDueLeft(b)));
  const nnew=all.filter(e=>e.status==='new').length, nwip=all.filter(e=>e.status==='wip').length;
  const nack=all.filter(estAckOverdue).length, ndone=all.filter(e=>e.status==='done').length;
  const chips=[['all','Все · '+all.length],['queue','В очереди · '+nnew],['overdue','Просрочено · '+all.filter(estOverdue).length]];
  const me=PEOPLE[S.currentUser];
  return `<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
      ${chips.map(([k,l])=>`<button class="chip" data-estfilter="${k}" aria-pressed="${f===k}">${l}</button>`).join('')}</div>
    <div class="stats" style="margin-bottom:16px">
      <div class="stat"><div class="v">${nnew}</div><div class="l">заявок в очереди на просчёт</div></div>
      <div class="stat"><div class="v">${nwip}</div><div class="l">в работе у инженеров</div></div>
      <div class="stat"><div class="v" style="-webkit-text-fill-color:${nack?'var(--risk)':'var(--good)'};color:${nack?'var(--risk)':'var(--good)'}">${nack}</div><div class="l">просрочен отклик (SLA 4 ч)</div></div>
      <div class="stat"><div class="v" style="-webkit-text-fill-color:var(--good);color:var(--good)">${ndone}</div><div class="l">просчитано</div></div>
    </div>
    <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px">Бутылочное горлышко конверсии — не продавец, а очередь на просчёт в ИЦ: обращения зависают, а молчание дольше 4 часов клиент читает как несерьёзность. Здесь у каждой заявки два SLA-таймера — на первый отклик (4 ч) и на полный просчёт (3 дн). Взятие в работу = отклик состоялся.</p>
    ${shown.map(e=>{ const st=EST_ST[e.status];
      const ackL=estAckLeft(e), dueL=estDueLeft(e);
      const ackChip = e.status==='new'
        ? (ackL<0?`<span class="stchip" style="color:var(--risk);border:1px solid var(--risk)">⚠ Отклик просрочен на ${fmtDur(ackL)}</span>`
           :`<span class="stchip" style="color:${ackL<60?'var(--warn)':'var(--muted)'};border:1px solid ${ackL<60?'var(--warn)':'var(--line)'}">До отклика (4 ч): ${fmtDur(ackL)}</span>`)
        : (e.status==='wip'?`<span class="stchip" style="color:var(--good);border:1px solid var(--good)">✓ Взят в работу</span>`:'');
      const dueChip = (e.status==='new'||e.status==='wip')
        ? (dueL<0?`<span class="stchip" style="color:var(--risk);border:1px solid var(--risk)">⚠ Просчёт просрочен на ${fmtDur(dueL)}</span>`
           :`<span class="stchip" style="color:${dueL<1440?'var(--warn)':'var(--muted)'};border:1px solid ${dueL<1440?'var(--warn)':'var(--line)'}">До просчёта (3 дн): ${fmtDur(dueL)}</span>`)
        : '';
      return `<div class="anacard" style="cursor:default${estOverdue(e)?';border-color:var(--risk)':''}">
      <div class="ana-top">
        <div><div class="ana-name">${esc(e.id)} · ${esc(e.title)}${e.goz?' <span class="stchip" style="color:var(--accent);border:1px solid var(--accent);font-size:9px">ГОЗ</span>':''}</div>
          <div class="ana-meta">${esc(e.company)} · ${esc(e.vessel)} · ${EST_SRC[e.source]||e.source}${e.who?' · '+esc(PEOPLE[e.who]?PEOPLE[e.who].full:e.who):''}</div></div>
        <span class="stchip" style="color:${st[1]};border:1px solid ${st[1]}">${st[0]}${e.status==='new'?' · '+fmtDur(e.ageMin):''}</span>
      </div>
      <div style="font-size:13px;color:var(--ink2);margin:10px 0">${esc(e.note)}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding-top:10px;border-top:1px solid var(--line2)">
        ${ackChip}${dueChip}
        ${e.status==='done'?`<span class="stchip" style="color:var(--good);border:1px solid var(--good)">${e.resHours} н/ч · ТКП ${fmtSum(e.resSum)}</span>${e.dealId?`<button class="chip" data-deal="${e.dealId}" style="margin-left:auto">↗ Сделка ${esc(e.dealId)}</button>`:''}`:''}
        ${e.status==='new'?`<button class="btn" style="padding:5px 12px;font-size:12px;margin-left:auto" data-esttake="${e.id}">Взять в работу</button><button class="btn ghost" style="padding:5px 12px;font-size:12px" data-estdecline="${e.id}">Не наша компетенция</button>`:''}
        ${e.status==='wip'?`<button class="btn" style="padding:5px 12px;font-size:12px;margin-left:auto" data-estdone="${e.id}">Отметить просчитанным →</button>`:''}
      </div></div>`; }).join('')||emptyBox('i-est','Нет заявок под этот фильтр','Переключите фильтр выше на «Все», чтобы увидеть весь просчёт. Заявки приходят сюда из сделок при запросе оценки ТЗ в ИЦ.')}`;
}

/* ---- Извещения об изменении (ГОСТ 2.503): реестр изменений КД + контроль соответствия модели архиву ---- */
const NKIND={replace:['Заменить','var(--warn)'],cancel:['Аннулировать','var(--risk)'],add:['Добавить','var(--good)'],correct:['Исправить','var(--steel)']};
const NREASON={error:'ошибка КД',tech:'технолог. улучшение',supply:'замена ПКИ (снабжение)',customer:'требование заказчика / ВП'};
const NST={draft:['Черновик','var(--muted)'],review:['На согласовании','var(--warn)'],applied:['Внедрено','var(--good)'],archived:['В архиве','var(--muted)']};
const NST_NEXT={draft:'review',review:'applied',applied:'archived'};
function notById(id){ return (S.notices||[]).find(n=>n.id===id); }
function noticeDesync(n){ return n.status==='applied' && !n.modelSync; }
function noticesAlerts(){ return (S.notices||[]).filter(n=>n.status==='review'||noticeDesync(n)).length; }
function vNotices(){
  const all=S.notices||[]; const f=S.notFilter||'all';
  const shown = f==='review'?all.filter(n=>n.status==='review')
    : f==='desync'?all.filter(noticeDesync)
    : all.slice();
  const ord={review:0,applied:1,draft:2,archived:3};
  shown.sort((a,b)=>(noticeDesync(b)-noticeDesync(a))||((ord[a.status]??9)-(ord[b.status]??9)));
  const nrev=all.filter(n=>n.status==='review').length, ndes=all.filter(noticeDesync).length;
  const chips=[['all','Все · '+all.length],['review','На согласовании · '+nrev],['desync','Рассинхрон модели · '+ndes]];
  return `<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">

const THEME_KEY = 'elling_theme';
function applyTheme(v){
  if(v) document.documentElement.dataset.theme = v;
  else delete document.documentElement.dataset.theme;
  const b = $('themeBtn'); if(b) b.textContent = v==='dark'?'☾':v==='light'?'☀':'◐';
}
function cycleTheme(){
  const cur = localStorage.getItem(THEME_KEY);
  const next = !cur ? 'dark' : cur==='dark' ? 'light' : null;
  const commit = ()=>{ if(next) localStorage.setItem(THEME_KEY, next); else localStorage.removeItem(THEME_KEY); applyTheme(next); };
  let reduce=false; try{ reduce=matchMedia('(prefers-reduced-motion:reduce)').matches; }catch(x){}
  if(reduce || typeof document.startViewTransition!=='function'){ commit(); return; }
  // плавное круговое раскрытие новой темы из центра кнопки (как в мобильных ОС)
  let cx=window.innerWidth-40, cy=44;
  try{ const b=$('themeBtn').getBoundingClientRect(); cx=b.left+b.width/2; cy=b.top+b.height/2; }catch(x){}
  const r=Math.hypot(Math.max(cx,window.innerWidth-cx),Math.max(cy,window.innerHeight-cy));
  try{
    const t=document.startViewTransition(commit);
    t.ready.then(()=>{
      document.documentElement.animate(
        {clipPath:[`circle(0px at ${cx}px ${cy}px)`,`circle(${r}px at ${cx}px ${cy}px)`]},
        {duration:560,easing:'cubic-bezier(.16,1,.3,1)',pseudoElement:'::view-transition-new(root)'});
    }).catch(()=>{});
  }catch(x){ commit(); }
}

function parseCSV(text){
  text = String(text).replace(/\r\n?/g,'\n').replace(/\n+$/,'');
  if(!text.trim()) return {headers:[], rows:[]};
  const first = text.split('\n')[0];
  const delim = (first.match(/;/g)||[]).length > (first.match(/,/g)||[]).length ? ';'
    : (first.includes('\t') ? '\t' : ',');
  const parseLine = line => {
    const out=[]; let cur='', q=false;
    for(let i=0;i<line.length;i++){ const c=line[i];
      if(q){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
      else { if(c==='"') q=true; else if(c===delim){ out.push(cur); cur=''; } else cur+=c; } }
    out.push(cur); return out.map(s=>s.trim());
  };
  const lines = text.split('\n').filter(l=>l.trim());
  const headers = parseLine(lines[0]);
  const rows = lines.slice(1).map(parseLine).filter(r=>r.some(c=>c));
  return {headers, rows};
}

}

function vToday(){
  const me = S.currentUser, p = PEOPLE[me];
  const wait = S.tasks.filter(t=>t.col==='rev'&&t.who===me);
  const od = t => { const di = dueInfo(t); return di && di.over ? 0 : 1; };
  const queue = S.tasks.filter(t=>(t.col==='open'||t.col==='wip')&&t.who===me)
    .sort((a,b)=>od(a)-od(b)||(a.sla?0:1)-(b.sla?0:1)||(a.prio==='hi'?0:1)-(b.prio==='hi'?0:1));
  const events = S.orders.flatMap(o=>o.feed.map(f=>({o,f}))).slice(-6).reverse();
  const wcard = (t,urgent)=>{
    const pa = primAction(t); const o = orderOfTask(t);
    return `<div class="wcard ${urgent?'urgent':''}" data-task="${t.key}">
      <div class="body"><span class="k">${t.key}${o?` · заказ №${o.num}`:''}</span>
        <div class="t">${esc(t.ttl)}</div>
        <div class="why">${t.col==='rev'?'<b>ждёт вашего решения</b> — дальше без вас не двинется':
          t.col==='wip'?'в работе у вас':'в вашей очереди'}${t.sla?` · <b>${t.sla}</b>`:''} ${dueBadge(t)}</div></div>
      ${pa?`<button class="btn big" data-move="${t.key}|${pa[0]}">${pa[1]}</button>`:''}</div>`;
  };
  const isBoss = p.role==='директор' || p.role==='рук. ИЦ';
  const pulse = isBoss ? (()=>{
    const ords=S.orders||[];
    const cOk=ords.filter(o=>o.risk==='ok').length, cWarn=ords.filter(o=>o.risk==='warn').length, cRisk=ords.filter(o=>o.risk==='risk').length;
    const forecast=(S.deals||[]).filter(d=>d.stage!=='lost').reduce((a,d)=>a+d.sum*((DEAL_PROB[d.stage]||0)/100),0);
    const estAll=S.estimates||[]; const ackOver=estAll.filter(e=>e.status==='new'&&(e.ackSlaMin-e.ageMin)<0).length;
    const slaPct=estAll.length?Math.round((estAll.length-ackOver)/estAll.length*100):100;
    const cc=c=>`color:${c};-webkit-text-fill-color:${c}`;
    const attn=[

/* ---- v1.3: встроенные метрики потока (CFD, throughput, lead time) ---- */
const FLOW_STATES = [ ['done','Готово','var(--good)'], ['rev','Согласование','var(--warn)'],
  ['wip','В работе','var(--steel)'], ['open','Очередь','var(--muted)'] ]; // порядок снизу вверх
let CFD_DATA = null;
function cfdSeries(){
  const cnt = c => S.tasks.filter(t=>t.col===c).length;
  const cur = {done:cnt('done'),rev:cnt('rev'),wip:cnt('wip'),open:cnt('open')};
  const N=14, out=[];
  for(let i=0;i<N;i++){ const t=i/(N-1); const w=k=>0.75+0.4*Math.abs(Math.sin(i*1.25+k)); // детерминированно, без random
    out.push({ done:Math.round(cur.done*(0.12+0.88*t)),
      rev:Math.max(0,Math.round(cur.rev*w(1)*(0.4+0.6*t))),
      wip:Math.max(0,Math.round(cur.wip*w(0)*(0.55+0.45*t))),
      open:Math.max(0,Math.round(cur.open*w(2)*(0.6+0.4*t))) }); }
  out[N-1]={...cur};
  return out;
}
function chartCFD(){
  const data = CFD_DATA = cfdSeries();
  const W=720,H=250,PL=34,PR=14,PT=14,PB=26, iw=W-PL-PR, ih=H-PT-PB;
  const totals = data.map(d=>d.done+d.rev+d.wip+d.open);
  const ymax = Math.max(4, ...totals);
  const X = i => PL + iw*i/(data.length-1);
  const Y = v => PT + ih*(1 - v/ymax);
  // накопление снизу: done, +rev, +wip, +open
  const cum = data.map(d=>{ let a=0; const o={}; FLOW_STATES.forEach(([k])=>{a+=d[k]; o[k]=a;}); return o; });
  const bands = FLOW_STATES.map(([k,,c],bi)=>{
    const top = data.map((_,i)=>[X(i), Y(cum[i][k])]);
    const prevKey = bi>0 ? FLOW_STATES[bi-1][0] : null;
    const bottom = data.map((_,i)=>[X(i), Y(prevKey? cum[i][prevKey] : 0)]).reverse();
    const pts = top.concat(bottom).map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    return `<polygon points="${pts}" style="fill:${c};opacity:.9;stroke:var(--panel);stroke-width:2"/>`;
  }).join('');
  const grid = [0,.25,.5,.75,1].map(f=>{ const y=PT+ih*f; const v=Math.round(ymax*(1-f));
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" style="stroke:var(--line2);stroke-width:1"/>
      <text x="${PL-6}" y="${y+4}" text-anchor="end" style="fill:var(--muted);font-size:10px;font-family:var(--mono)">${v}</text>`; }).join('');
  const xlab = [0,4,8,13].map(i=>`<text x="${X(i)}" y="${H-8}" text-anchor="middle" style="fill:var(--muted);font-size:10px;font-family:var(--mono)">${i===13?'сегодня':'−'+(13-i)+'д'}</text>`).join('');
  const legend = FLOW_STATES.slice().map(([k,l,c])=>`<span class="lg"><i style="background:${c}"></i>${l} · ${data[13][k]}</span>`).join('');
  return `<div class="chart-head"><h3>Диаграмма потока (CFD) <span class="ch-sub">задачи по статусам · 14 дней</span></h3>
      <div class="legend2">${legend}</div></div>
    <div class="chart-box"><svg id="cfdChart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${grid}${bands}${xlab}
      <line id="cfdCross" x1="0" y1="${PT}" x2="0" y2="${PT+ih}" style="stroke:var(--ink);stroke-width:1;opacity:0;pointer-events:none"/>
      <rect x="${PL}" y="${PT}" width="${iw}" height="${ih}" fill="transparent" id="cfdHit"/>
    </svg><div class="chart-tip" id="cfdTip"></div></div>
    <p class="ch-note">Расширение полосы «Очередь/В работе» — растёт незавершёнка, риск затора. Ровный рост «Готово» — стабильная пропускная способность.</p>`;
}
function chartThroughput(){
  const base=[3,5,2,6,4]; const doneNow=S.tasks.filter(t=>t.col==='done').length;
  const weeks=base.map((b,i)=>Math.max(1, b + (i===base.length-1? Math.max(0,doneNow-4):0)));
  const mx=Math.max(...weeks), W=720,H=150,PL=30,PB=22,PT=10,iw=W-PL-14,ih=H-PT-PB, bw=iw/weeks.length*0.5;
  const bars=weeks.map((v,i)=>{ const x=PL+iw*(i+0.5)/weeks.length-bw/2; const h=ih*v/mx; const y=PT+ih-h;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="4" style="fill:var(--good)"/>
      <text x="${(x+bw/2).toFixed(1)}" y="${(y-5).toFixed(1)}" text-anchor="middle" style="fill:var(--ink);font-size:11px;font-weight:700;font-family:var(--mono)">${v}</text>
      <text x="${(x+bw/2).toFixed(1)}" y="${H-6}" text-anchor="middle" style="fill:var(--muted);font-size:10px;font-family:var(--mono)">${i===weeks.length-1?'тек.':'−'+(weeks.length-1-i)+'нед'}</text>`; }).join('');
  return `<div class="chart-head"><h3>Пропускная способность <span class="ch-sub">задач закрыто по неделям</span></h3></div>
    <div class="chart-box"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <line x1="${PL}" y1="${PT+ih}" x2="${W-14}" y2="${PT+ih}" style="stroke:var(--line);stroke-width:1"/>${bars}</svg></div>`;
}
function chartDealFunnel(){
  const active=(S.deals||[]).filter(d=>d.stage!=='lost');
  const rows=DEAL_STAGES.map(([sk,sn,sc])=>{ const ds=active.filter(d=>d.stage===sk);
    return {sn,sc,n:ds.length,sum:ds.reduce((a,d)=>a+d.sum,0)}; });
  const maxN=Math.max(1,...rows.map(r=>r.n));
  const total=active.reduce((a,d)=>a+d.sum,0);
  const forecast=active.reduce((a,d)=>a+d.sum*((DEAL_PROB[d.stage]||0)/100),0);
  const lost=(S.deals||[]).filter(d=>d.stage==='lost').length;
  return `<div class="chart-head"><h3>Воронка продаж <span class="ch-sub">сделки по стадиям · взвешенный прогноз</span></h3></div>
    ${rows.map(r=>`<div style="display:flex;align-items:center;gap:10px;margin:6px 0">
      <span style="width:132px;flex:none;font-size:12.5px;color:var(--ink)">${r.sn}</span>

      <span style="width:36px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--ink)">${r.n}</span>
      <span style="width:84px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted)">${r.sum?fmtSum(r.sum):'—'}</span>
    </div>`).join('')}

      <span>Сумма воронки: <b style="color:var(--ink)">${fmtSum(total)}</b></span>
      <span>Взвешенный прогноз: <b style="color:var(--accent)">${fmtSum(forecast)}</b></span>
      ${lost?`<span>Проиграно: <b style="color:var(--risk)">${lost}</b></span>`:''}
    </div>
    <p class="ch-note">Прогноз считается из стадий и вероятностей, а не из оптимизма менеджера — системное смещение ручных прогнозов на этом рынке доходит до −35%.</p>`;
}
function chartEstFunnel(){
  const es=S.estimates||[]; const tot=es.length;
  const responded=es.filter(e=>e.status==='wip'||e.status==='done').length;
  const completed=es.filter(e=>e.status==='done').length;
  const ackOver=es.filter(e=>e.status==='new'&&(e.ackSlaMin-e.ageMin)<0).length;
  const slaPct=tot?Math.round((tot-ackOver)/tot*100):100;
  const newOnes=es.filter(e=>e.status==='new');
  const avgQ=newOnes.length?Math.round(newOnes.reduce((a,e)=>a+e.ageMin,0)/newOnes.length):0;
  const steps=[['Поступило',tot,'var(--steel)'],['Взято в работу',responded,'var(--navy)'],['Просчитано',completed,'var(--good)']];
  const mx=Math.max(1,tot);
  return `<div class="chart-head"><h3>Конверсия просчёта <span class="ch-sub">путь заявки на оценку ТЗ + SLA</span></h3></div>

async function uploadDoc(f){
  try{
    S.kbMsg = `Загружаю «${f.name}»…`; render();
    const r = await fetch('/api/docs', {method:'POST',
      headers:AH({ 'X-Filename': encodeURIComponent(f.name),
                'X-User': encodeURIComponent(PEOPLE[S.currentUser].full+' · '+PEOPLE[S.currentUser].role) }),
      body: await f.arrayBuffer()});
    if(!r.ok){ const j = await r.json().catch(()=>({})); S.kbMsg = 'Ошибка загрузки: '+(j.error||r.status); render(); return; }
    const m = await r.json();
    S.docs.unshift({tp:(m.ext||'файл').toUpperCase(), nm:`${m.name} — загружен пользователем`, vv:m.note, tags:m.name});
    ACTS.push(`загружен документ: ${m.name}`);
    S.kbMsg = `«${m.name}»: ${m.note}. Документ проиндексирован — ищите по содержимому.`;
    save(); render();
  }catch(e){ S.kbMsg = 'Ошибка загрузки — сервер недоступен'; setSrv(false); render(); }
}

document.addEventListener('change', e=>{
  if(e.target.id==='upFile'){ const f=e.target.files[0]; e.target.value=''; if(f) uploadDoc(f); return; }
  if(e.target.id==='impFile'){ const f=e.target.files[0]; e.target.value=''; if(f){
    const done=(txt,enc)=>{ const {headers,rows}=parseCSV(txt); S.imp={text:'',headers,rows,map:autoMap(headers),
      msg:rows.length?`Файл «${f.name}» разобран${enc?' ('+enc+')':''}.`:'Файл пуст или не распознан.'}; render(); };
    const rd=new FileReader();
    rd.onload=()=>{ const utf=rd.result;
      // реальные Excel-CSV на RU-Windows часто в cp1251 → детект кракозябр и перечитка (ревью v1.5)
      if(utf.includes('\uFFFD')){ const rd2=new FileReader();
        rd2.onload=()=>done(rd2.result,'Windows-1251'); rd2.onerror=()=>done(utf); rd2.readAsText(f,'windows-1251'); }
      else done(utf); };
    rd.readAsText(f,'utf-8'); } return; }
  const im=e.target.closest('[data-impmap]');
  if(im){ S.imp.map[im.dataset.impmap]=e.target.value; return; }
  if(e.target.id==='userSel'){ S.currentUser=e.target.value; S.navOpen=navOpenForRole(S.currentUser); render(); return; }
  if(e.target.id==='benchDealSel'){ const id=e.target.value; S.benchDeal=id||null;
    if(id){ const m=dealMatchBench(dealById(id)); S.benchCmp=m?m.b.id:null; } else { S.benchCmp=null; }

  const rc = e.target.closest('[data-rule]');
  if(rc){ const r=(S.rules||[]).find(x=>x.id===rc.dataset.rule); if(r){ r.enabled = e.target.checked?1:0;

  if(e.target.id==='dealStage'){ const d=dealById($('drawer').dataset.deal||''); if(d){ moveDeal(d, e.target.value); render(); openDeal(d.id); } return; }
  const t = task($('drawer').dataset.task||'');
  if(t && $('drawer').classList.contains('open')){
    if(e.target.id==='f_col'){ moveTask(t,e.target.value,'вручную'); save(); render(); openTask(t.key); return; }
    if(e.target.id==='f_who'){ t.who=e.target.value; t.log.push(`исполнитель: ${PEOPLE[t.who].full}`); save(); render(); return; }
    if(e.target.id==='f_prio'){ t.prio=e.target.value; save(); render(); return; }
    if(e.target.id==='f_epic'){ t.epic=e.target.value; save(); render(); return; }
    if(e.target.id==='f_est'){ t.est=e.target.value; save(); return; }
    if(e.target.id==='f_due'){ t.due=e.target.value||null; t.log.push(`срок: ${t.due||'снят'}`); ACTS.push(`${t.key}: срок ${t.due||'снят'}`); save(); render(); return; }
    const sub = e.target.closest('[data-sub]');
    if(sub){ t.subs[+sub.dataset.sub].done = e.target.checked; save(); openTask(t.key); return; }
  }
});

document.addEventListener('input', e=>{
  if(e.target.id==='q'){ S.q=e.target.value; if(S.view==='board'||S.view==='plan') render(); }
  if(e.target.id==='kbq'){ S.kbq=e.target.value;
    // на вкладке «Поиск» текст ТЗ печатается/вставляется без ре-рендера (сохраняем фокус),
    // результаты — по кнопке; в каталоге/файлах — живой фильтр
    if((S.kbTab||'search')!=='search'){ render(); const i=$('kbq'); if(i){ i.focus(); i.setSelectionRange(i.value.length,i.value.length); } } }
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ if($('welcome').classList.contains('open')) closeWelcome(); else if($('dwgViewer').classList.contains('open')) closeDwg(); else { closeDrawer(); $('createOverlay').classList.remove('open'); } } });

/* drag & drop (доска задач И воронка сделок) */
document.addEventListener('dragstart', e=>{
  const c = e.target.closest('.tcard'); if(!c) return;
  // карточка задачи несёт data-task, карточка сделки — data-deal
  e.dataTransfer.setData('text/plain', (c.dataset.task? 'T:'+c.dataset.task : c.dataset.deal? 'D:'+c.dataset.deal : ''));
  c.classList.add('dragging');
});
function clearDragover(){ document.querySelectorAll('.col.dragover').forEach(c=>c.classList.remove('dragover')); }
function popCard(sel){ try{ requestAnimationFrame(()=>{ const el=document.querySelector(sel); if(el) el.classList.add('moved'); }); }catch(x){} }
document.addEventListener('dragend', e=>{ const c=e.target.closest('.tcard'); if(c) c.classList.remove('dragging'); clearDragover(); });
document.addEventListener('dragover', e=>{ const col=e.target.closest('.col'); if(col){ e.preventDefault(); if(!col.classList.contains('dragover')){ clearDragover(); col.classList.add('dragover'); } } });
document.addEventListener('drop', e=>{
  const col = e.target.closest('.col'); if(!col){ clearDragover(); return; }
  e.preventDefault(); clearDragover();
  const raw = e.dataTransfer.getData('text/plain');
  if(raw.startsWith('D:') && col.dataset.dealcol){        // сделка → новая стадия воронки
    const d = dealById(raw.slice(2));
    if(d && d.stage!==col.dataset.dealcol){ moveDeal(d, col.dataset.dealcol); render(); popCard(`[data-deal="${raw.slice(2)}"]`); }
    return;
  }
  if(raw.startsWith('T:') && col.dataset.col){            // задача → новый статус доски
    const t = task(raw.slice(2));
    if(t && t.col!==col.dataset.col){ moveTask(t,col.dataset.col,'перетащил '+PEOPLE[S.currentUser].full); render(); popCard(`[data-task="${raw.slice(2)}"]`); return; }
    render();
  }
});

/* CFD hover: крестик + тултип со счётчиками по статусам (делегировано) */
document.addEventListener('pointermove', e=>{
  const hit = e.target.closest('#cfdHit'); const tip=$('cfdTip'), cross=$('cfdCross'), svg=$('cfdChart');
  if(!hit || !CFD_DATA || !tip){ if(tip){tip.style.opacity=0;} if(cross)cross.style.opacity=0; return; }
  const r=svg.getBoundingClientRect(); const PL=34, PR=14, iw=720-PL-PR;
  const fx=(e.clientX-r.left)/r.width*720; // в координатах viewBox
  let i=Math.round((fx-PL)/iw*(CFD_DATA.length-1)); i=Math.max(0,Math.min(CFD_DATA.length-1,i));
  const xpx=PL+iw*i/(CFD_DATA.length-1);
  cross.setAttribute('x1',xpx); cross.setAttribute('x2',xpx); cross.style.opacity=.4;
  const d=CFD_DATA[i]; const day=i===13?'сегодня':('−'+(13-i)+' дн');
  tip.innerHTML=`<div style="font-family:var(--mono);font-size:10px;color:#9fb0c0;margin-bottom:4px">${day}</div>`+
    FLOW_STATES.slice().reverse().map(([k,l,c])=>`<div class="tr"><span><i style="background:${c};display:inline-block"></i> ${l}</span><b>${d[k]}</b></div>`).join('');
  const box=hit.closest('.chart-box').getBoundingClientRect();
  tip.style.left=Math.min(box.width-140,(xpx/720*box.width)+10)+'px'; tip.style.top='8px'; tip.style.opacity=1;
});
document.addEventListener('pointerleave', ()=>{ const t=$('cfdTip'); if(t)t.style.opacity=0; }, true);

/* вьюер чертежей: колесо-зум + панорама (делегировано — #dwgStage пересоздаётся) */
document.addEventListener('wheel', e=>{
  if(e.target.closest('#dwgStage') && DWG.code){ e.preventDefault(); dwgZoom(e.deltaY<0?1.12:0.9, e.clientX, e.clientY); }
}, {passive:false});
let dwgPan=null;
document.addEventListener('pointerdown', e=>{
  const s=e.target.closest('#dwgStage');
  if(s && DWG.code && DWG.mode!=='annotate' && !e.target.closest('[data-pin]')){
    dwgPan={x:e.clientX,y:e.clientY,tx:DWG.tx,ty:DWG.ty,id:e.pointerId};
    try{ s.setPointerCapture(e.pointerId); }catch(x){}   // не «залипает» при выходе за окно (ревью v1.1)
  }
});
document.addEventListener('pointermove', e=>{
  if(dwgPan && (e.buttons & 1)){ DWG.tx=dwgPan.tx+(e.clientX-dwgPan.x); DWG.ty=dwgPan.ty+(e.clientY-dwgPan.y); applyDwgTransform(); }
  else if(dwgPan && !(e.buttons & 1)){ dwgPan=null; }
});
document.addEventListener('pointerup', ()=>{ dwgPan=null; });
document.addEventListener('pointercancel', ()=>{ dwgPan=null; });

/* create */
function openCreate(epicId){
  $('nt_epic').innerHTML = S.epics.map(x=>`<option value="${x.id}" ${epicId===x.id?'selected':''}>${x.name}</option>`).join('');
  $('nt_who').innerHTML = Object.keys(PEOPLE).map(p=>`<option value="${p}" ${p===S.currentUser?'selected':''}>${PEOPLE[p].full} · ${PEOPLE[p].role}</option>`).join('');
  $('nt_title').value=''; $('nt_est').value=''; $('nt_desc').value=''; $('nt_due').value='';
  $('nt_prio').value='md'; $('nt_col').value='open';
  $('createOverlay').classList.add('open'); $('nt_title').focus();
}
function createTask(){
  const ttl = $('nt_title').value.trim(); if(!ttl) return;
  S.seq++;
  S.tasks.unshift({key:'СТ-'+S.seq, ttl, epic:$('nt_epic').value, who:$('nt_who').value, col:$('nt_col').value,
    prio:$('nt_prio').value, est:$('nt_est').value||null, sla:null, due:$('nt_due').value||null,
    desc:$('nt_desc').value.trim(), subs:[], comments:[], links:[], watchers:[],
    log:[`создана ${PEOPLE[S.currentUser].full} · назначена: ${PEOPLE[$('nt_who').value].full}`]});
  ACTS.push(`создана задача СТ-${S.seq}: ${ttl.slice(0,60)}`);
  $('createOverlay').classList.remove('open'); render(); toast('Задача создана: СТ-'+S.seq,'ok');
}

applyTheme(localStorage.getItem(THEME_KEY));
buildNav();
render();
bootstrapSrv();
try{ if(!localStorage.getItem(WELCOME_KEY)) openWelcome(); }catch(e){}  // приветствие при первом входе
setInterval(()=>{ if(runAutomations('timer')) renderBg(); }, 60000);  // v0.9: авто-проверка просрочек (renderBg — не рвём ввод, ревью v1.0)
</script>
